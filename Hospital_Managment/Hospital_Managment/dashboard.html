{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), 
                    url('https://images.unsplash.com/photo-1538108149393-fbbd81895907?auto=format&fit=crop&w=1600&q=80');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }
</style>

<h1>Dashboard</h1>
<div class="row mt-4">
    <div class="col-md-4">
        <div class="card bg-info text-white">
            <div class="card-body">
                <h5 class="card-title">Patients</h5>
                <p class="card-text fs-2">{{ patient_count }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-success text-white">
            <div class="card-body">
                <h5 class="card-title">Doctors</h5>
                <p class="card-text fs-2">{{ doctor_count }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-warning text-dark">
            <div class="card-body">
                <h5 class="card-title">Pending Appointments</h5>
                <p class="card-text fs-2">{{ pending_appointments }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
